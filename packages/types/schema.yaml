components:
  schemas:
    AddOn:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_active:
          type: boolean
      required:
      - branch
      - id
      - name
      - price
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        restaurant:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        address:
          type: string
        timezone:
          type: string
          maxLength: 64
      required:
      - id
      - name
      - restaurant
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        sort_order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_active:
          type: boolean
      required:
      - branch
      - id
      - name
    CategoryWithItems:
      type: object
      description: Category with its nested items — the POS/offline menu tree.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        sort_order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_active:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
          readOnly: true
      required:
      - branch
      - id
      - items
      - name
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        phone:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 120
      required:
      - branch
      - id
      - phone
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        restaurant:
          allOf:
          - $ref: '#/components/schemas/Restaurant'
          readOnly: true
        branch:
          allOf:
          - $ref: '#/components/schemas/Branch'
          readOnly: true
        can_authorize_overrides:
          type: boolean
          readOnly: true
      required:
      - branch
      - can_authorize_overrides
      - id
      - restaurant
      - username
    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        category:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        base_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_veg:
          type: boolean
        pieces_per_plate:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        gst_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        is_available:
          type: boolean
        sort_order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        variation_groups:
          type: array
          items:
            $ref: '#/components/schemas/VariationGroup'
          readOnly: true
      required:
      - base_price
      - branch
      - category
      - id
      - name
      - variation_groups
    ModeEnum:
      enum:
      - cash
      - card
      - upi
      type: string
      description: |-
        * `cash` - Cash
        * `card` - Card
        * `upi` - UPI
    Order:
      type: object
      description: |-
        Read/write order. On create/replace, prices are snapshotted from the
        catalog and GST totals are computed server-side (authoritative).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        table:
          type: string
          format: uuid
          nullable: true
        customer:
          type: string
          format: uuid
          nullable: true
        placed_by:
          type: integer
          nullable: true
        order_type:
          $ref: '#/components/schemas/OrderTypeEnum'
        status:
          $ref: '#/components/schemas/OrderStatusEnum'
        number:
          type: integer
          readOnly: true
          nullable: true
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        tax_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        discount_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        grand_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRead'
          readOnly: true
        items_write:
          type: array
          items:
            $ref: '#/components/schemas/_OrderItemWrite'
          writeOnly: true
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
          readOnly: true
      required:
      - branch
      - grand_total
      - id
      - items
      - number
      - payments
      - subtotal
      - tax_total
    OrderItemAddOnRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        add_on:
          type: string
          format: uuid
        name_snapshot:
          type: string
          maxLength: 160
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - add_on
      - id
      - name_snapshot
    OrderItemOptionRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        option:
          type: string
          format: uuid
        name_snapshot:
          type: string
          maxLength: 160
        price_delta:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - id
      - name_snapshot
      - option
    OrderItemRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        menu_item:
          type: string
          format: uuid
        name_snapshot:
          type: string
          maxLength: 200
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        gst_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        notes:
          type: string
          maxLength: 200
        is_void:
          type: boolean
        options:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemOptionRead'
          readOnly: true
        add_ons:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemAddOnRead'
          readOnly: true
        line_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        tax_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - add_ons
      - id
      - line_total
      - menu_item
      - name_snapshot
      - options
      - tax_amount
      - unit_price
    OrderStatusEnum:
      enum:
      - open
      - held
      - billed
      - paid
      - void
      type: string
      description: |-
        * `open` - Open
        * `held` - Held
        * `billed` - Billed
        * `paid` - Paid
        * `void` - Void
