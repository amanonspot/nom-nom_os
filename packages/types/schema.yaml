openapi: 3.0.3
info:
  title: Nom Nom OS API
  version: 0.1.0
  description: Offline-first Restaurant OS — sync, catalog, operations, licensing.
paths:
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/me/:
    get:
      operationId: me
      description: Return the authenticated user with restaurant/branch/role context.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
components:
  schemas:
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        restaurant:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        address:
          type: string
        timezone:
          type: string
          maxLength: 64
      required:
      - id
      - name
      - restaurant
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        restaurant:
          allOf:
          - $ref: '#/components/schemas/Restaurant'
          readOnly: true
        branch:
          allOf:
          - $ref: '#/components/schemas/Branch'
          readOnly: true
        can_authorize_overrides:
          type: boolean
          readOnly: true
      required:
      - branch
      - can_authorize_overrides
      - id
      - restaurant
      - username
    Restaurant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        gstin:
          type: string
          maxLength: 15
        owner_email:
          type: string
          format: email
          maxLength: 254
      required:
      - id
      - name
    RoleEnum:
      enum:
      - owner
      - admin
      - manager
      - waiter
      - cashier
      - kitchen
      type: string
      description: |-
        * `owner` - Owner
        * `admin` - Admin
        * `manager` - Manager
        * `waiter` - Waiter
        * `cashier` - Cashier
        * `kitchen` - Kitchen
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
