services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nomnom
      POSTGRES_USER: nomnom
      POSTGRES_PASSWORD: nomnom
    ports:
      - "5432:5432"
    volumes:
      - nomnom_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomnom"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nomnom_pg:
